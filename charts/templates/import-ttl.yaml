apiVersion: v1
kind: ConfigMap
metadata:
  name: import-ttl-job
  namespace: {{ .Values.cluster.namespace }}
data:
  import-ttl.sh: |
    #!/bin/sh
    set -e

    # ======================================================================================
    # TFDS SCHEMA SEEDER (POST-Only)
    #
    # Architecture Decision: 
    # Ontologies are foundational. Dynamically updating schemas (via PUT) risks breaking
    # existing data offerings across the federation. 
    # Therefore, this script acts purely as an idempotent database seeder. 
    # It attempts to CREATE (POST) the schemas. If the Federated Catalogue returns a 
    # "conflict_error" (meaning the schema already exists), it assumes success and safely 
    # skips to the next file without overwriting.
    # ======================================================================================

    if [ -z "$1" ]; then
      echo "Usage: $0 <ENDPOINT_URL>"
      exit 1
    fi

    ENDPOINT_URL="$1"
    SCHEMA_PATH="/schemas"

    # Healthcheck
    until curl -s --head --fail "${ENDPOINT_URL}/schemas" >/dev/null; do 
      echo "Waiting for endpoint to become available..."; sleep 5; 
    done

    # Safe seeder function
    seed_schema() {
      local FILE_URL=$1
      local FILE_NAME=$(basename "$FILE_URL")
      local TMP_FILE=$(mktemp)

      echo "--------------------------------------------------------"
      echo "Downloading $FILE_NAME..."
      curl -sSL "$FILE_URL" -o "$TMP_FILE"

      echo "Attempting to create (POST) $FILE_NAME..."
      RESPONSE=$(curl -s -w "\n%{http_code}" --location "${ENDPOINT_URL}${SCHEMA_PATH}" \
        --header "Content-Type: text/turtle" \
        --header "Accept: application/json" \
        --data-binary @"$TMP_FILE")
      
      HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if echo "$BODY" | grep -q "conflict_error" || echo "$BODY" | grep -q "Schema redefines existing terms"; then
        echo " Success: Schema already exists in catalogue. Skipping creation."
      elif [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
        echo " Success: Creation complete for $FILE_NAME (HTTP $HTTP_CODE)."
      else
        echo " FAILED to create $FILE_NAME (HTTP $HTTP_CODE)."
        echo " Error: $BODY"
        # We don't exit the script here so we can see all errors at once if multiple fail
      fi
      
      rm "$TMP_FILE"
    }

    BASE_RAW_URL="https://raw.githubusercontent.com/ForumViriumHelsinki/TFDS_SIMPL-open_governance_authority/refs/heads/feature/TFDS-schemas/tfds-schemas"
    
    # NOTE: The order is critical! Base SIMPL schemas must be loaded BEFORE TFDS extensions.
    
    # 1. Base SIMPL Ontology
    seed_schema "${BASE_RAW_URL}/ontology/simpl_ontology.ttl"
    
    # 2. Base SIMPL Shapes
    seed_schema "${BASE_RAW_URL}/shape/simpl_shapes.ttl"
    
    # 3. TFDS Extended Ontology
    seed_schema "${BASE_RAW_URL}/ontology/tfds_ontology.ttl"
    
    # 4. TFDS Extended Shapes
    seed_schema "${BASE_RAW_URL}/shape/tfds_shapes.ttl"

    echo "--------------------------------------------------------"
    echo "All schemas processed."

---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.cluster.namespace }}
  name: import-ttl-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 12
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      containers:
      - name: script-runner
        image: quay.io/curl/curl
        command: ["/bin/sh", "/postconfig/import-ttl.sh", "http://xsfc-service:8081"]
        volumeMounts:
        - name: postconfig-volume
          mountPath: /postconfig
      volumes:
      - name: postconfig-volume
        configMap:
          name: import-ttl-job