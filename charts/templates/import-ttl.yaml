
apiVersion: v1
kind: ConfigMap
metadata:
  name: import-ttl-job
  namespace: {{ .Values.cluster.namespace }}
data:
  import-ttl.sh: |
    #!/bin/sh

    # Exit on error
    set -e

    # ======================================================================================
    # TFDS SCHEMA LOADER (Smart POST-then-PUT)
    #
    # Why this script exists:
    # 1. Idempotency: The XFSC Federated Catalogue strictly uses POST for creating schemas
    #    and PUT for updating them. If we only POST, future Helm upgrades/syncs will fail
    #    with a "conflict_error" (Schema redefines existing terms). This script handles both.
    # 2. Separation of Concerns: We split the schemas into 4 files (SIMPL Base + TFDS Ext)
    #    so we can target the exact schema IDs (namespaces) required by the PUT API.
    # 3. Complete GitOps Control: All files are pulled directly from our Github repository,
    #    insulating us from upstream breaking changes.
    # ======================================================================================

    # Usage check
    if [ -z "$1" ]; then
      echo "Usage: $0 <ENDPOINT_URL>"
      exit 1
    fi

    # Get the endpoint from the first argument
    ENDPOINT_URL="$1"
    SCHEMA_PATH="/schemas"

    # Healthcheck
    until curl -s --head --fail "${ENDPOINT_URL}/schemas" >/dev/null; do
      echo "Waiting for endpoint to become available..."; sleep 5;
    done

    # Smart loader function
    load_schema() {
      local FILE_URL=$1
      local SCHEMA_ID=$2
      local FILE_NAME=$(basename "$FILE_URL")
      local TMP_FILE=$(mktemp)

      echo "--------------------------------------------------------"
      echo "Downloading $FILE_NAME..."
      curl -sSL "$FILE_URL" -o "$TMP_FILE"

      echo "Attempting to create (POST) $FILE_NAME..."
      RESPONSE=$(curl -s -w "\n%{http_code}" --location "${ENDPOINT_URL}${SCHEMA_PATH}" \
        --header "Content-Type: text/turtle" \
        --header "Accept: application/json" \
        --data-binary @"$TMP_FILE")

      HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
      BODY=$(echo "$RESPONSE" | sed '$d')

      if echo "$BODY" | grep -q "conflict_error" || echo "$BODY" | grep -q "Schema redefines existing terms"; then
        echo "Schema already exists. Falling back to update (PUT)..."

        # URL Encode the schema ID using sed (Alpine/POSIX compatible)
        # Replaces ':', '/', and '#' with their percent-encoded equivalents
        ENCODED_ID=$(echo "$SCHEMA_ID" | sed 's/:/%3A/g' | sed 's/\//%2F/g' | sed 's/#/%23/g')

        PUT_RESPONSE=$(curl -s -w "\n%{http_code}" --location "${ENDPOINT_URL}${SCHEMA_PATH}/${ENCODED_ID}" \
          --request PUT \
          --header "Content-Type: text/turtle" \
          --header "Accept: application/json" \
          --data-binary @"$TMP_FILE")

        PUT_HTTP_CODE=$(echo "$PUT_RESPONSE" | tail -n1)
        PUT_BODY=$(echo "$PUT_RESPONSE" | sed '$d')

        if [ "$PUT_HTTP_CODE" -ge 200 ] && [ "$PUT_HTTP_CODE" -lt 300 ]; then
          echo " Update complete for $FILE_NAME (HTTP $PUT_HTTP_CODE)."
        else
          echo " PUT Failed for $FILE_NAME (HTTP $PUT_HTTP_CODE)."
          echo " Error: $PUT_BODY"
        fi
      elif [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
        echo " Creation complete for $FILE_NAME (HTTP $HTTP_CODE)."
      else
        echo " POST Failed for $FILE_NAME (HTTP $HTTP_CODE)."
        echo " Error: $BODY"
      fi

      rm "$TMP_FILE"
    }

    BASE_RAW_URL="https://raw.githubusercontent.com/ForumViriumHelsinki/TFDS_SIMPL-open_governance_authority/refs/heads/feature/TFDS-schemas/tfds-schemas"

    # NOTE: The order is critical! Base SIMPL schemas must be loaded BEFORE TFDS extensions.

    # 1. Base SIMPL Ontology
    load_schema "${BASE_RAW_URL}/ontology/simpl_ontology.ttl" "https://w3id.org/simpl#"

    # 2. Base SIMPL Shapes
    load_schema "${BASE_RAW_URL}/shape/simpl_shapes.ttl" "https://w3id.org/simpl#"

    # 3. TFDS Extended Ontology
    load_schema "${BASE_RAW_URL}/ontology/tfds_ontology.ttl" "https://trafficflowdataspace.eu/ontology#"

    # 4. TFDS Extended Shapes
    load_schema "${BASE_RAW_URL}/shape/tfds_shapes.ttl" "https://trafficflowdataspace.eu/ontology#"

    echo "--------------------------------------------------------"
    echo "All schemas successfully processed."

---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.cluster.namespace }}
  name: import-ttl-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
spec:
  backoffLimit: 12
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      containers:
      - name: script-runner
        image: quay.io/curl/curl
        command: ["/bin/sh", "/postconfig/import-ttl.sh", "http://xsfc-service:8081"]
        volumeMounts:
        - name: postconfig-volume
          mountPath: /postconfig
      volumes:
      - name: postconfig-volume
        configMap:
          name: import-ttl-job
