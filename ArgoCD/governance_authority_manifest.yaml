apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'authority-deployer'             # name of the deploying app in argocd
  namespace: argocd                        # namespace of your argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ForumViriumHelsinki/TFDS_SIMPL-open_governance_authority.git'
    path: charts
    targetRevision: main                  # version of package
    helm:
      values: |
        singleNode: true
        values:
          branch: main                 # branch of repo with values - for released version it should be the release branch
        project: default                    # Project to which the namespace is attached
        namespaceTag: 
          authority: authority            # identifier of deployment and part of fqdn for this agent
          common: common                  # identifier of deployment and part of fqdn for common components
        domainSuffix: ds.helsinki.tfds.io           # last part of fqdn
        organization:
          name: "FVH"
          unit: "Data"
          country: "FI"
        resourcePreset: low             # set to "low" to disable requests of resources
        argocd:
          appname: authority              # name of generated argocd app 
          namespace: argocd                 # namespace of your argocd
        cluster:
          address: https://kubernetes.default.svc
          namespace: authority             # where the app will be deployed
          commonToolsNamespace: common      # namespace where main monitoring stack is deployed
          issuer: dev-prod            # certificate issuer name
        secrets:
          role: example-role                # role created in OpenBao for access
          secretEngine: example            # container for secrets in your OpenBao
        monitoring:
          enabled: false                     # you can set it to false if you don't have common monitoring stack
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: authority                  # where the package will be deployed